<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Ligeirinho Gás e Água</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #f97316;
      --primary-hover: #ea580c;
      --background: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --input-bg: rgba(15, 23, 42, 0.6);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --error: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--background);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(249, 115, 22, 0.05) 0%, transparent 50%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #fb923c, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .login-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      color: var(--text);
      font-size: 0.9375rem;
      transition: all 0.2s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
    }

    .show-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .show-password:hover {
      color: var(--text);
    }

    .login-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.875rem;
      font-size: 0.9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
      padding: 0.75rem;
      border-radius: 0.75rem;
      font-size: 0.8125rem;
      margin-bottom: 1.25rem;
      display: none;
      text-align: center;
    }

    .footer-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    /* Lucide icons injection style */
    .lucide {
      width: 18px;
      height: 18px;
    }
    
    .loader {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-area">
      <img src="../favicon.svg" alt="Ligeirinho" style="width: 48px; height: 48px;">
      <h1>Ligeirinho Gás</h1>
    </div>

    <div class="login-card">
      <div id="error-message"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">E-mail Administrativo</label>
          <div class="input-wrapper">
            <i data-lucide="mail"></i>
            <input type="email" id="email" class="login-input" placeholder="seu@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Senha de Acesso</label>
          <div class="input-wrapper">
            <i data-lucide="lock"></i>
            <input type="password" id="password" class="login-input" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="show-password" onclick="togglePassword()">
              <i data-lucide="eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="submit-btn">
          <span>Entrar no Painel</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>
    </div>

    <p class="footer-text">© 2026 Ligeirinho Gás e Água — Painel de Controle</p>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="login.js"></script>
  <script>
    lucide.createIcons();
    
    function togglePassword() {
      const p = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (p.type === 'password') {
        p.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        p.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
